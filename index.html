<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raja Rani Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div id="auth-screen" class="mt-20 w-full max-w-sm glass p-8 rounded-3xl text-center">
        <h1 class="text-3xl font-bold text-yellow-500 mb-6">RAJA RANI 👑</h1>
        <input type="text" id="p-name" placeholder="Your Name" class="w-full p-4 rounded-xl bg-slate-800 mb-4 outline-none">
        <button onclick="enterLobby()" class="w-full py-4 bg-yellow-500 text-black font-bold rounded-xl">Play Now</button>
    </div>

    <div id="lobby-screen" class="hidden mt-10 w-full max-w-sm glass p-8 rounded-3xl">
        <button onclick="createNewRoom()" class="w-full py-4 bg-blue-600 rounded-xl mb-4 font-bold">Create Room</button>
        <div class="flex gap-2">
            <input type="text" id="r-code" placeholder="Code" class="flex-1 p-4 rounded-xl bg-slate-800 uppercase outline-none">
            <button onclick="joinExistingRoom()" class="px-6 bg-slate-700 rounded-xl font-bold">Join</button>
        </div>
    </div>

    <div id="game-screen" class="hidden w-full max-w-md mt-10 space-y-4">
        <div class="flex justify-between glass p-4 rounded-xl text-sm">
            <span>Room: <b id="display-code" class="text-yellow-500">--</b></span>
            <span>Score: <b id="display-score" class="text-green-400">0</b></span>
        </div>
        <div id="identity-box" class="hidden glass p-6 rounded-2xl text-center border-b-4 border-yellow-500">
            <p class="text-xs text-slate-400">YOUR ROLE</p>
            <h2 id="my-role" class="text-3xl font-bold">...</h2>
        </div>
        <div id="player-list" class="grid grid-cols-2 gap-4"></div>
        <button id="host-roll-btn" onclick="triggerRoll()" class="hidden w-full py-4 bg-white text-black font-bold rounded-xl shadow-lg">ROLL ROLES 🎲</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCg2LXzyUOasdVK9QtJ-jDvt0a_cYo62Us",
            authDomain: "rajaranigame-e99fc.firebaseapp.com",
            databaseURL: "https://rajaranigame-e99fc-default-rtdb.firebaseio.com",
            projectId: "rajaranigame-e99fc",
            storageBucket: "rajaranigame-e99fc.firebasestorage.app",
            messagingSenderId: "130582573101",
            appId: "1:130582573101:web:69b0f332d57e44ed5708a4",
            measurementId: "G-82YW19TQW9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myName = "";
        let roomID = "";
        let amIHost = false;

        // Attach functions to window so HTML buttons can find them
        window.enterLobby = () => {
            myName = document.getElementById('p-name').value.trim();
            if(!myName) return;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('lobby-screen').classList.remove('hidden');
        };

        window.createNewRoom = () => {
            roomID = Math.random().toString(36).substring(2, 7).toUpperCase();
            amIHost = true;
            connectToRoom();
        };

        window.joinExistingRoom = () => {
            roomID = document.getElementById('r-code').value.toUpperCase();
            if(roomID) connectToRoom();
        };

        function connectToRoom() {
            set(ref(db, `raja_rani/${roomID}/players/${myName}`), {
                name: myName, score: 0, role: 'Hidden'
            });

            onValue(ref(db, 'raja_rani/' + roomID), (snap) => {
                const data = snap.val();
                if(data) renderUI(data);
            });

            document.getElementById('lobby-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('display-code').innerText = roomID;
        }

        function renderUI(data) {
            const list = document.getElementById('player-list');
            list.innerHTML = '';
            const me = data.players[myName];
            document.getElementById('display-score').innerText = me.score || 0;
            
            if(me.role !== 'Hidden') {
                document.getElementById('identity-box').classList.remove('hidden');
                document.getElementById('my-role').innerText = me.role;
            }

            if(amIHost && data.state !== 'playing') {
                document.getElementById('host-roll-btn').classList.remove('hidden');
            } else {
                document.getElementById('host-roll-btn').classList.add('hidden');
            }

            Object.values(data.players).forEach(p => {
                const card = document.createElement('div');
                card.className = "glass p-4 rounded-xl text-center";
                card.innerHTML = `<div class="font-bold">${p.name}</div><div class="text-xs text-slate-500">Pts: ${p.score || 0}</div>`;
                list.appendChild(card);
            });
        }

        window.triggerRoll = () => {
            const roles = ['Raja', 'Rani', 'Mantri', 'Police', 'Thief'].sort(() => Math.random() - 0.5);
            get(ref(db, `raja_rani/${roomID}/players`)).then((snap) => {
                let i = 0;
                snap.forEach((child) => {
                    update(ref(db, `raja_rani/${roomID}/players/${child.key}`), { role: roles[i] || 'Villager' });
                    i++;
                });
                update(ref(db, `raja_rani/${roomID}`), { state: 'playing' });
            });
        };
    </script>
</body>
</html>
