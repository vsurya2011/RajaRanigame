<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Raja Rani Pro | Chat & Voice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #050a18; color: #e2e8f0; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .chat-drawer { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(100%); }
        .chat-drawer.open { transform: translateY(0); }
        .voice-active { border: 2px solid #ef4444; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .gold { color: #ffd700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
        .silver { color: #c0c0c0; }
        .bronze { color: #cd7f32; }
        
        /* Fixed Notification Styles for Mobile */
        #chat-notification { transform: translateY(-150%); transition: transform 0.3s ease; }
        #chat-notification.show { transform: translateY(0); }
        .badge { position: absolute; top: -5px; right: -5px; background: #ef4444; color: white; font-size: 10px; font-weight: 800; padding: 2px 6px; border-radius: 99px; border: 2px solid #050a18; display: none; }
        
        /* Message Wrap Fix */
        .msg-bubble { word-wrap: break-word; overflow-wrap: break-word; word-break: break-word; }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center">

    <div id="chat-notification" class="fixed top-4 left-1/2 -translate-x-1/2 w-[92%] max-w-sm glass p-3 rounded-2xl z-[200] flex items-center gap-3 border-l-4 border-yellow-500 shadow-2xl pointer-events-none">
        <div class="bg-yellow-500/20 p-2 rounded-full text-lg">💬</div>
        <div class="flex-1 min-w-0">
            <p id="notif-user" class="text-[10px] font-800 text-yellow-500 uppercase tracking-widest"></p>
            <p id="notif-text" class="text-xs text-slate-200 leading-tight"></p>
        </div>
    </div>

    <div id="auth-screen" class="w-full max-w-sm mt-12 space-y-6">
        <div class="text-center">
            <h1 class="text-5xl font-800 text-yellow-500 mb-2 tracking-tighter uppercase">Raja Rani</h1>
            <p class="text-slate-400 text-sm font-bold uppercase tracking-widest">Multiplayer Edition</p>
        </div>
        <div class="glass p-6 rounded-3xl space-y-4 shadow-2xl">
            <input type="text" id="p-name" placeholder="Enter Nickname" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-yellow-500 text-white">
            <button onclick="enterLobby()" class="w-full py-4 bg-yellow-500 text-slate-900 font-800 rounded-2xl active:scale-95 transition-all">START GAME</button>
        </div>
    </div>

    <div id="lobby-screen" class="hidden w-full max-w-sm mt-10 space-y-6">
        <div class="glass p-6 rounded-3xl space-y-6 shadow-2xl">
            <button onclick="createNewRoom()" class="w-full py-4 bg-indigo-600 text-white font-bold rounded-2xl active:scale-95 transition-all text-sm uppercase tracking-widest">Create Room</button>
            <div class="flex flex-col gap-3">
                <input type="text" id="r-code" placeholder="ENTER CODE" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-2xl uppercase outline-none text-center tracking-widest">
                <button onclick="joinExistingRoom()" class="w-full py-4 bg-slate-700 font-bold rounded-2xl active:scale-95">JOIN</button>
            </div>
        </div>
    </div>

    <div id="game-screen" class="hidden w-full max-w-2xl space-y-4 pb-40">
        <div class="flex justify-between items-center glass p-4 rounded-2xl shadow-lg">
            <div class="flex flex-col">
                <span class="text-[10px] text-slate-400 font-bold uppercase">Room: <b id="display-code" class="text-yellow-500">----</b></span>
                <span id="voice-status" class="text-[9px] text-red-500 font-bold uppercase tracking-tighter">Voice: OFF</span>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleVoice()" id="voice-btn" class="p-3 bg-slate-700 rounded-xl text-lg hover:bg-slate-600 transition-colors">🎙️</button>
                <div class="relative">
                    <button onclick="toggleChat()" class="p-3 bg-slate-700 rounded-xl text-lg hover:bg-slate-600 transition-colors">💬</button>
                    <div id="chat-badge" class="badge">0</div>
                </div>
            </div>
            <div class="text-right">
                <span class="text-[10px] text-slate-400 font-bold uppercase">Score</span>
                <div id="display-score" class="font-800 text-green-400 text-xl leading-none">0</div>
            </div>
        </div>

        <div id="identity-box" class="hidden glass p-4 rounded-2xl text-center border-t-2 border-yellow-500 shadow-xl">
            <p class="text-[9px] uppercase text-slate-400 font-bold mb-1">Your Secret Role</p>
            <h2 id="my-role" class="text-3xl font-800 text-yellow-500 uppercase">---</h2>
        </div>

        <div id="player-list" class="grid grid-cols-2 gap-3"></div>

        <div class="fixed bottom-0 left-0 right-0 p-6 flex flex-col items-center gap-2 pointer-events-none">
            <div class="flex gap-2 w-full max-w-sm pointer-events-auto">
                <button id="host-roll-btn" onclick="triggerRoll()" class="hidden flex-1 py-5 bg-yellow-500 text-slate-900 font-800 rounded-2xl shadow-2xl active:scale-95 transition-all">
                    ROLL ROLES 🎲
                </button>
                <button id="host-end-btn" onclick="endGame()" class="hidden px-4 py-5 bg-red-600 text-white font-800 rounded-2xl shadow-2xl active:scale-95 transition-all">
                    END 🛑
                </button>
            </div>
            <div id="status-msg" class="bg-slate-800/95 backdrop-blur px-4 py-2 rounded-full text-[10px] text-slate-300 border border-white/10 uppercase font-bold tracking-tight">
                Waiting for participants...
            </div>
        </div>
    </div>

    <div id="leaderboard-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-slate-950/90 backdrop-blur-md p-6">
        <div class="glass w-full max-w-sm rounded-[40px] p-8 text-center space-y-6 border-2 border-yellow-500/30">
            <h2 class="text-4xl font-800 text-yellow-500 uppercase tracking-tighter">Final Rankings</h2>
            <div id="ranking-list" class="space-y-4"></div>
            <button onclick="location.reload()" class="w-full py-4 bg-slate-700 text-white font-800 rounded-2xl uppercase text-xs tracking-widest">Back to Home</button>
        </div>
    </div>

    <div id="chat-drawer" class="chat-drawer fixed bottom-0 left-0 right-0 h-[70vh] glass rounded-t-[40px] z-[250] p-6 flex flex-col shadow-2xl">
        <div class="flex justify-between items-center mb-4">
            <div class="w-12 h-1.5 bg-slate-600 rounded-full cursor-pointer" onclick="toggleChat()"></div>
            <h3 class="font-800 text-slate-400 text-xs uppercase tracking-widest ml-4">Room Chat</h3>
            <button onclick="toggleChat()" class="text-slate-400 hover:text-white p-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
        
        <div id="chat-messages" class="flex-1 overflow-y-auto space-y-3 mb-4 p-2 flex flex-col"></div>

        <div class="flex gap-2 p-2 bg-slate-900/50 rounded-2xl">
            <input type="text" id="chat-input" placeholder="Type message..." class="flex-1 bg-transparent p-4 outline-none text-white text-sm">
            <button onclick="sendChat()" class="bg-yellow-500 text-black px-6 py-3 rounded-xl font-800 active:scale-95 transition-all">SEND</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, get, push, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCg2LXzyUOasdVK9QtJ-jDvt0a_cYo62Us",
            authDomain: "rajaranigame-e99fc.firebaseapp.com",
            databaseURL: "https://rajaranigame-e99fc-default-rtdb.firebaseio.com",
            projectId: "rajaranigame-e99fc",
            storageBucket: "rajaranigame-e99fc.firebasestorage.app",
            messagingSenderId: "130582573101",
            appId: "1:130582573101:web:69b0f332d57e44ed5708a4",
            measurementId: "G-82YW19TQW9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let myName, roomID, amIHost = false, isVoiceOn = false;
        let unreadCount = 0;
        let chatOpen = false;

        const AGORA_APP_ID = "031e2ac6cafc49c396567b5fa9dd3a47";
        let rtc = { localAudioTrack: null, client: AgoraRTC.createClient({ mode: "rtc", codec: "vp8" }) };

        window.enterLobby = () => {
            myName = document.getElementById('p-name').value.trim();
            if(!myName) return;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('lobby-screen').classList.remove('hidden');
        };

        window.createNewRoom = () => {
            roomID = Math.random().toString(36).substring(2, 6).toUpperCase();
            amIHost = true;
            connectToRoom();
        };

        window.joinExistingRoom = () => {
            roomID = document.getElementById('r-code').value.toUpperCase();
            if(roomID) connectToRoom();
        };

        function showNotification(user, text) {
            if(user === myName) return;
            const notif = document.getElementById('chat-notification');
            document.getElementById('notif-user').innerText = user;
            document.getElementById('notif-text').innerText = text;
            notif.classList.add('show');
            setTimeout(() => notif.classList.remove('show'), 4000);
        }

        function connectToRoom() {
            set(ref(db, `raja_rani/${roomID}/players/${myName}`), { name: myName, score: 0, role: 'Hidden', isTalking: false });
            
            onValue(ref(db, 'raja_rani/' + roomID), (snap) => {
                const data = snap.val();
                if(data) {
                    if(data.state === 'ended') showFinalLeaderboard(data.players);
                    else renderGame(data);
                }
            });

            onChildAdded(ref(db, `raja_rani/${roomID}/chats`), (snap) => {
                const msg = snap.val();
                const div = document.createElement('div');
                const isMe = msg.user === myName;
                const isSystem = msg.user === "SYSTEM";
                
                if(isSystem) {
                    div.className = "p-3 text-center text-[11px] text-yellow-500 font-bold uppercase tracking-widest bg-yellow-500/10 rounded-2xl w-full mb-2 msg-bubble";
                    div.innerHTML = `🚨 ${msg.text}`;
                } else {
                    div.className = `p-3 rounded-2xl max-w-[85%] shadow-md msg-bubble ${isMe ? 'bg-indigo-600 self-end rounded-tr-none' : 'bg-slate-800 self-start rounded-tl-none'}`;
                    div.innerHTML = `<p class="text-[9px] opacity-60 font-bold uppercase mb-1">${isMe ? 'You' : msg.user}</p><p class="leading-tight text-[13px]">${msg.text}</p>`;
                }
                
                const container = document.getElementById('chat-messages');
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;

                if(!chatOpen && !isMe) {
                    unreadCount++;
                    const badge = document.getElementById('chat-badge');
                    badge.innerText = unreadCount;
                    badge.style.display = 'block';
                    showNotification(msg.user, msg.text);
                }
            });

            document.getElementById('lobby-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('display-code').innerText = roomID;
        }

        function renderGame(data) {
            const list = document.getElementById('player-list');
            list.innerHTML = '';
            const me = data.players[myName];
            document.getElementById('display-score').innerText = me.score || 0;
            
            if(me.role !== 'Hidden') {
                document.getElementById('identity-box').classList.remove('hidden');
                document.getElementById('my-role').innerText = me.role;
            } else {
                document.getElementById('identity-box').classList.add('hidden');
            }

            if(amIHost) {
                document.getElementById('host-end-btn').classList.remove('hidden');
                if(data.state !== 'playing') document.getElementById('host-roll-btn').classList.remove('hidden');
                else document.getElementById('host-roll-btn').classList.add('hidden');
            }

            Object.values(data.players).forEach(p => {
                const card = document.createElement('div');
                card.className = `glass p-4 rounded-3xl flex flex-col items-center text-center transition-all ${p.isTalking ? 'voice-active' : ''} ${p.name === myName ? 'border-yellow-500/40' : ''}`;
                
                let btn = "";
                if(me.role === 'Police' && p.name !== myName && data.state === 'playing') {
                    btn = `<button onclick="makeGuess('${p.name}')" class="mt-3 w-full bg-red-600 text-white text-[10px] font-800 py-2 rounded-xl uppercase tracking-widest shadow-lg">Guess Thief</button>`;
                }

                card.innerHTML = `
                    <div class="w-10 h-10 bg-slate-800 rounded-full mb-2 flex items-center justify-center font-800 text-yellow-500 border border-white/5">${p.name[0]}</div>
                    <div class="font-bold text-[11px] truncate w-full uppercase">${p.name}</div>
                    <div class="text-[9px] text-slate-500 font-bold">PTS: ${p.score || 0}</div>
                    ${btn}
                `;
                list.appendChild(card);
            });
        }

        window.sendChat = () => {
            const input = document.getElementById('chat-input');
            const val = input.value.trim();
            if(!val) return;
            push(ref(db, `raja_rani/${roomID}/chats`), { user: myName, text: val });
            input.value = "";
        };

        document.getElementById('chat-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendChat(); });
        
        window.toggleChat = () => {
            const drawer = document.getElementById('chat-drawer');
            chatOpen = !chatOpen;
            drawer.classList.toggle('open');
            if(chatOpen) {
                unreadCount = 0;
                document.getElementById('chat-badge').style.display = 'none';
            }
        };

        window.toggleVoice = async () => {
            isVoiceOn = !isVoiceOn;
            const btn = document.getElementById('voice-btn');
            const status = document.getElementById('voice-status');
            if(isVoiceOn) {
                try {
                    await rtc.client.join(AGORA_APP_ID, roomID, null, null);
                    rtc.localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack();
                    await rtc.client.publish([rtc.localAudioTrack]);
                    rtc.client.on("user-published", async (user, mediaType) => {
                        await rtc.client.subscribe(user, mediaType);
                        if (mediaType === "audio") user.audioTrack.play();
                    });
                    btn.classList.add('bg-red-600'); status.innerText = "Voice: ON";
                    status.classList.replace('text-red-500', 'text-green-500');
                    update(ref(db, `raja_rani/${roomID}/players/${myName}`), { isTalking: true });
                } catch(e) { alert("Mic failed!"); isVoiceOn = false; }
            } else {
                if(rtc.localAudioTrack) { rtc.localAudioTrack.stop(); rtc.localAudioTrack.close(); }
                await rtc.client.leave();
                btn.classList.remove('bg-red-600'); status.innerText = "Voice: OFF";
                status.classList.replace('text-green-500', 'text-red-500');
                update(ref(db, `raja_rani/${roomID}/players/${myName}`), { isTalking: false });
            }
        };

        window.triggerRoll = () => {
            get(ref(db, `raja_rani/${roomID}/players`)).then((snap) => {
                const count = snap.size;
                if(count < 3) return alert("Need 3+ players da!");
                let roles = ['Police', 'Thief'];
                let pool = ['Raja', 'Rani', 'Mantri', 'Postman', 'Milkman', 'Citizen', 'Citizen'];
                while(roles.length < count) roles.push(pool.shift() || 'Citizen');
                roles = roles.sort(() => Math.random() - 0.5);
                let i = 0;
                snap.forEach((child) => { update(ref(db, `raja_rani/${roomID}/players/${child.key}`), { role: roles[i++] }); });
                update(ref(db, `raja_rani/${roomID}`), { state: 'playing' });
                push(ref(db, `raja_rani/${roomID}/chats`), { user: "SYSTEM", text: "Roles have been assigned! Police, find the thief!" });
            });
        };

        window.makeGuess = (targetName) => {
            get(ref(db, `raja_rani/${roomID}`)).then((snap) => {
                const data = snap.val();
                const targetRole = data.players[targetName].role;
                const thiefName = Object.keys(data.players).find(k => data.players[k].role === 'Thief');

                if(targetRole === 'Thief') {
                    confetti({ particleCount: 150, spread: 60, origin: { y: 0.7 } });
                    push(ref(db, `raja_rani/${roomID}/chats`), { user: "SYSTEM", text: `Police (${myName}) found the Thief (${thiefName})! +300 PTS` });
                    finalizeRound(data, myName, 300); 
                } else {
                    push(ref(db, `raja_rani/${roomID}/chats`), { user: "SYSTEM", text: `Wrong guess! Thief was ${thiefName}! Thief wins +300 PTS` });
                    finalizeRound(data, thiefName, 300);
                }
            });
        };

        function finalizeRound(data, winner, bonus) {
            Object.keys(data.players).forEach(name => {
                let p = 0; const r = data.players[name].role;
                if(r==='Raja') p=1500; else if(r==='Rani') p=1000; else if(r==='Mantri') p=800;
                else if(r==='Postman') p=200; else if(r==='Milkman') p=150; else if(r==='Citizen') p=100;
                const final = (name === winner) ? (p + bonus) : p;
                set(ref(db, `raja_rani/${roomID}/players/${name}/score`), (data.players[name].score || 0) + final);
                update(ref(db, `raja_rani/${roomID}/players/${name}`), { role: 'Hidden' });
            });
            update(ref(db, `raja_rani/${roomID}`), { state: 'idle' });
        }

        window.endGame = () => {
            if(!confirm("End the game and see final rankings?")) return;
            update(ref(db, `raja_rani/${roomID}`), { state: 'ended' });
        };

        function showFinalLeaderboard(players) {
            const sorted = Object.values(players).sort((a, b) => (b.score || 0) - (a.score || 0));
            const list = document.getElementById('ranking-list');
            list.innerHTML = '';
            
            sorted.slice(0, 3).forEach((p, idx) => {
                const colors = ['gold', 'silver', 'bronze'];
                const icons = ['🥇', '🥈', '🥉'];
                const div = document.createElement('div');
                div.className = `p-4 rounded-2xl bg-white/5 flex justify-between items-center border border-white/5 ${colors[idx]}`;
                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="text-2xl">${icons[idx]}</span>
                        <div class="text-left">
                            <p class="font-800 uppercase text-sm">${p.name}</p>
                            <p class="text-[10px] opacity-60">Rank ${idx + 1}</p>
                        </div>
                    </div>
                    <div class="text-xl font-800">${p.score || 0}</div>
                `;
                list.appendChild(div);
            });
            document.getElementById('leaderboard-modal').classList.remove('hidden');
            confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 } });
        }
    </script>
</body>
</html>
